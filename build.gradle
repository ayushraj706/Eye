// android/app/build.gradle
// ─────────────────────────────────────────────────────────────────────────────
// NOTE: This file shows the CUSTOMIZATIONS to apply to the default Capacitor
// android/app/build.gradle that gets generated by `npx cap add android`.
// After running cap add, merge these into your generated build.gradle.
// ─────────────────────────────────────────────────────────────────────────────

apply plugin: 'com.android.application'

android {
    namespace "com.ytmusic.wrapper"
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.ytmusic.wrapper"
        minSdkVersion 26          // Android 8.0+ — covers all modern devices
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // Large WebView heap for YouTube Music
        manifestPlaceholders = [
            'appAuthRedirectScheme': 'com.ytmusic.wrapper'
        ]
    }

    // ── Signing ──────────────────────────────────────────────────────────────
    signingConfigs {
        release {
            // Values injected by CI via -P flags or local keystore.properties
            if (project.hasProperty('android.injected.signing.store.file')) {
                storeFile file(project.property('android.injected.signing.store.file'))
                storePassword project.property('android.injected.signing.store.password')
                keyAlias project.property('android.injected.signing.key.alias')
                keyPassword project.property('android.injected.signing.key.password')
            } else {
                // Local dev: create a keystore.properties file (not committed)
                def keystorePropsFile = rootProject.file("keystore.properties")
                if (keystorePropsFile.exists()) {
                    def props = new Properties()
                    props.load(new FileInputStream(keystorePropsFile))
                    storeFile file(props['storeFile'])
                    storePassword props['storePassword']
                    keyAlias props['keyAlias']
                    keyPassword props['keyPassword']
                }
            }
        }
    }

    // ── Build Types ──────────────────────────────────────────────────────────
    buildTypes {
        debug {
            debuggable true
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            minifyEnabled true          // Enable R8/ProGuard
            shrinkResources true        // Remove unused resources
            signingConfig signingConfigs.release

            proguardFiles(
                getDefaultProguardFile('proguard-android-optimize.txt'),
                'proguard-rules.pro'
            )
        }
    }

    // ── Compile options ──────────────────────────────────────────────────────
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // ── Packaging ────────────────────────────────────────────────────────────
    packagingOptions {
        resources {
            excludes += ['META-INF/LICENSE', 'META-INF/NOTICE']
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
}
