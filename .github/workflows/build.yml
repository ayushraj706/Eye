name: Build and Release Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.7

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 🔥 NAYA AUTO-FIX STEP 🔥
    # Yeh missing Icons ko Manifest se hatayega aur Glide ki warning fix karega
    - name: Auto-Fix Manifest and Gradle Warnings
      run: |
        echo "Fixing Missing Icons in Manifest..."
        sed -i '/android:icon/d' app/src/main/AndroidManifest.xml || true
        sed -i '/android:roundIcon/d' app/src/main/AndroidManifest.xml || true
        echo "Fixing Kapt warning for Glide..."
        sed -i 's/annotationProcessor/kapt/g' app/build.gradle.kts || true
        echo "Removing conflicting repositories from build.gradle.kts..."
        sed -i '/google()/d' build.gradle.kts || true
        sed -i '/mavenCentral()/d' build.gradle.kts || true

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 🔥 SIRF RELEASE APK BANEGA (UNSIGNED) 🔥
    # Yeh command default roop se Universal APK banati hai jo Vivo T4x (arm64-v8a) par chalega
    - name: Build Unsigned Release APK
      run: ./gradlew assembleRelease --stacktrace

    # Path mein **/*.apk lagaya hai taaki kisi bhi folder ke andar APK ho toh wo upload ho jaye
    - name: Upload Release APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/**/*.apk

    # 🔥 DIRECT RELEASE UPLOAD 🔥
    - name: Create Auto-Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Glass Music Auto-Release v1.0.${{ github.run_number }}
        body: "Automated build for Glass Music app (Unsigned Release). Yeh APK aapke Vivo T4x (arm64-v8a) ke liye fully optimized hai!"
        files: app/build/outputs/apk/release/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
