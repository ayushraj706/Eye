name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ☕ JDK 21 plugins compatibility ke liye zaroori hai
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🕵️‍♂️ Find ALL Syntax Errors (TypeScript)
        continue-on-error: true
        run: npx tsc --noEmit

      - name: 🕵️‍♂️ Find ALL Code Errors (ESLint)
        continue-on-error: true
        run: npx next lint

      - name: Build Web (Next.js)
        run: |
          rm -rf .next
          npm run build

      # 🛠️ Android folder setup aur Crash hone se bachane ke liye permissions inject karega
      - name: Setup Capacitor Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android
          
          # CRASH FIX: AndroidManifest.xml me Internet Permissions aur Cleartext Traffic automatic add karega
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # Internet aur Network State permissions inject karega
            sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST_PATH
            # Application tag me cleartext traffic aur hardware acceleration allow karega
            sed -i 's/<application/<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true"/g' $MANIFEST_PATH
            echo "AndroidManifest.xml successfully patched with Network permissions! ✓"
          else
            echo "Warning: Manifest file nahi mili patching ke liye."
          fi

      # 🚀 Fresh generated directory ke andar jaakar universal APK banayega
      - name: Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # ✍️ UNSIGNED APK KO SIGN KAREGA (Taaki Vivo T4x me installation block na ho)
      - name: Sign Android APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            $BUILD_TOOLS_DIR/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out android/app/build/outputs/apk/release/YTMusic-Signed.apk android/app/build/outputs/apk/release/app-release-unsigned.apk || true
          fi
          
          # Backup Fallback: Agar upar wala bypass hua toh debug build auto-generate hogi jo already signed hoti hai
          if [ ! -f "android/app/build/outputs/apk/release/YTMusic-Signed.apk" ]; then
            echo "Release sign failed, generating debug signed build as fallback..."
            cd android && ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/YTMusic-Signed.apk
          fi

      # 📦 Sirf ek single main application file download button mein dega (Vivo T4x ke liye perfect)
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: YTMusic-Vivo-T4x
          path: android/app/build/outputs/apk/release/YTMusic-Signed.apk
