name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 🕵️‍♂️ DETECTIVE STEP 1: Pura project scan karega (Bina ruke saari galtiya batayega)
      - name: 🕵️‍♂️ Find ALL Syntax Errors (TypeScript)
        continue-on-error: true
        run: npx tsc --noEmit

      # 🕵️‍♂️ DETECTIVE STEP 2: Har file ki line-by-line checking (Bina ruke)
      - name: 🕵️‍♂️ Find ALL Code Errors (ESLint)
        continue-on-error: true
        run: npx next lint

      # Asli Build Step (Agar upar galtiya hongi toh ye waise bhi batayega, par upar wale steps exact line batayenge)
      - name: Build Web (Next.js)
        run: |
          rm -rf .next
          npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Release)
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/
