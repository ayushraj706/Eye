name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ☕ JDK 21 plugins compatibility ke liye zaroori hai
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🕵️‍♂️ Find ALL Syntax Errors (TypeScript)
        continue-on-error: true
        run: npx tsc --noEmit

      - name: 🕵️‍♂️ Find ALL Code Errors (ESLint)
        continue-on-error: true
        run: npx next lint

      - name: Build Web (Next.js)
        run: |
          rm -rf .next
          npm run build

      # 🛠️ Fresh Android Generation + Safe Package Pathing (Same file conflict fix)
      - name: Setup Capacitor Android
        run: |
          # 1. Purane files ko server se saaf karo
          rm -rf android
          
          # 2. Fresh native folder generate aur sync karo
          npx cap add android
          npx cap sync android
          
          # 3. build.gradle (App level) mein applicationId check aur patch karo
          SED_APP_GRADLE="android/app/build.gradle"
          if [ -f "$SED_APP_GRADLE" ]; then
            sed -i 's/applicationId ".*"/applicationId "com.ytmusic.wrapper"/g' $SED_APP_GRADLE
            echo "App level build.gradle patched! ✓"
          fi

          # 4. AndroidManifest.xml network settings fix karo
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST_PATH
            sed -i 's/<application/<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true"/g' $MANIFEST_PATH
            echo "AndroidManifest.xml successfully patched! ✓"
          fi

          # 5. Java Directory Alignment (Safe conditional move ke sath)
          cd android/app/src/main/java
          
          # Default MainActivity dhundo
          DEFAULT_MAIN_ACT=$(find . -name "MainActivity.java" | head -n 1)
          
          if [ ! -z "$DEFAULT_MAIN_ACT" ]; then
            # Agar file pehle se hi 'com/ytmusic/wrapper' mein nahi hai, tabhi copy-shift karo
            if [[ "$DEFAULT_MAIN_ACT" != *"com/ytmusic/wrapper"* ]]; then
              mkdir -p com/ytmusic/wrapper
              cp $DEFAULT_MAIN_ACT com/ytmusic/wrapper/MainActivity.java
              sed -i 's/package .*/package com.ytmusic.wrapper;/g' com/ytmusic/wrapper/MainActivity.java
              
              # Purana kachra saaf karo duplicate se bachne ke liye
              rm -rf io com/example com/ionic 2>/dev/null || true
              echo "MainActivity moved to custom package path! ✓"
            else
              # ⚡ CRASH FIX: Agar pehle se sahi jagah hai, toh copy skip karke sirf header update karo
              sed -i 's/package .*/package com.ytmusic.wrapper;/g' $DEFAULT_MAIN_ACT
              echo "MainActivity already in correct path, package header updated! ✓"
            fi
          fi

      # 🚀 Universal APK build karega
      - name: Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # ✍️ UNSIGNED APK KO SIGN KAREGA (Taaki Vivo T4x me chal sake)
      - name: Sign Android APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            $BUILD_TOOLS_DIR/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out android/app/build/outputs/apk/release/YTMusic-Signed.apk android/app/build/outputs/apk/release/app-release-unsigned.apk || true
          fi
          
          # Backup Fallback
          if [ ! -f "android/app/build/outputs/apk/release/YTMusic-Signed.apk" ]; then
            echo "Release sign failed, switching to signed debug module..."
            cd android && ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/YTMusic-Signed.apk
          fi

      # 📦 Final Downloadable File Output
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: YTMusic-Vivo-T4x
          path: android/app/build/outputs/apk/release/YTMusic-Signed.apk
