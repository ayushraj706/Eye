name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ☕ JDK 21 plugins compatibility ke liye zaroori hai
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Node.js setup Next.js build ke liye
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web (Next.js)
        run: |
          rm -rf .next
          npm run build

      # 🛠️ Naya Android platform setup + Teri Custom Files ka Forceful Injector (With Black Screen Fix)
      - name: Setup Capacitor and Inject Custom Android Logic
        run: |
          # 1. Pehle cloud par agar koi tute-phute traces hain toh saaf karo
          rm -rf android_tmp
          
          # 2. Apne repo mein jo tumhara custom android folder hai, usko surakshit backup kar lo
          if [ -d "android" ]; then
            mv android android_tmp
          fi
          
          # 3. Ekdum brand new fresh Android wrapper template generate karo
          npx cap add android
          npx cap sync android
          
          # 4. Ab tumhara custom logic naye folder ke upar overwrite karo
          if [ -d "android_tmp" ]; then
            echo "Injecting your custom Android configurations (MainActivity, Manifest, Gradle)..."
            
            # Custom build.gradle, ProGuard, aur Manifest ko unki sahi jagah par forcefully override karo
            cp -f android_tmp/app/build.gradle android/app/build.gradle || true
            cp -f android_tmp/app/proguard-rules.pro android/app/proguard-rules.pro || true
            cp -f android_tmp/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml || true
            
            # Custom package path (com/ytmusic/wrapper) bana kar MainActivity.java shift karo
            mkdir -p android/app/src/main/java/com/ytmusic/wrapper
            cp -f android_tmp/app/src/main/java/com/ytmusic/wrapper/MainActivity.java android/app/src/main/java/com/ytmusic/wrapper/MainActivity.java || true
            
            # ⚡ JAVA COMPILE CRASH FIX: MainActivity me functions ko dynamic public specifier me force-change karega
            TARGET_MAIN_ACT="android/app/src/main/java/com/ytmusic/wrapper/MainActivity.java"
            if [ -f "$TARGET_MAIN_ACT" ]; then
              sed -i 's/protected void onResume()/public void onResume()/g' $TARGET_MAIN_ACT
              sed -i 's/protected void onPause()/public void onPause()/g' $TARGET_MAIN_ACT
              echo "MainActivity.java access modifiers forced to public! ✓"
            fi
            
            # ⚡ BLACK SCREEN & WEBVIEW FIX: Manifest me cleartext code ko false se badal kar true force karega
            TARGET_MANIFEST="android/app/src/main/AndroidManifest.xml"
            if [ -f "$TARGET_MANIFEST" ]; then
              sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/g' $TARGET_MANIFEST
              echo "AndroidManifest.xml cleartext patch successfully applied! ✓"
            fi
            
            # Naye default folders (com/example ya io/ionic) ka kachra saaf karo duplicate error se bachne ke liye
            cd android/app/src/main/java
            find . -maxdepth 1 -type d ! -name "." ! -name "com" -exec rm -rf {} + 2>/dev/null || true
            rm -rf com/example com/ionic 2>/dev/null || true
            cd ../../../../..
            
            # Ek baar final sync chalao taaki saare codes merge ho jayein
            npx cap sync android
            echo "Custom music-wrapper architecture successfully injected! ✓"
          else
            echo "Error: Repo me custom android config nahi mila!"
            exit 1
          fi

      # 🚀 Universal APK build karega full logic ke sath
      - name: Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # ✍️ UNSIGNED APK KO SIGN KAREGA (Taaki Vivo T4x me directly install ho sake)
      - name: Sign Android APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            $BUILD_TOOLS_DIR/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out android/app/build/outputs/apk/release/YTMusic-Signed.apk android/app/build/outputs/apk/release/app-release-unsigned.apk || true
          fi
          
          # Backup Fallback
          if [ ! -f "android/app/build/outputs/apk/release/YTMusic-Signed.apk" ]; then
            echo "Release sign failed, switching to signed debug build..."
            cd android && ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/YTMusic-Signed.apk
          fi

      # 📦 Final Downloadable File Output
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: YTMusic-Vivo-T4x
          path: android/app/build/outputs/apk/release/YTMusic-Signed.apk
