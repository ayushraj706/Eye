name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🕵️‍♂️ Find ALL Syntax Errors (TypeScript)
        continue-on-error: true
        run: npx tsc --noEmit

      - name: 🕵️‍♂️ Find ALL Code Errors (ESLint)
        continue-on-error: true
        run: npx next lint

      - name: Build Web (Next.js)
        run: |
          rm -rf .next
          npm run build

      # 🛠️ Android folder ko setup aur sync karne ke liye
      - name: Setup Capacitor Android
        run: |
          npx cap add android || echo "Android platform already added"
          npx cap sync android

      # 🚀 Directory switch karke permission set karega aur universal APK banayega
      - name: Build APK (Release)
        run: |
          cd android
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleRelease
          else
            echo "Error: gradlew file nahi mili! Platform sync check karo."
            exit 1
          fi

      # 📦 Sirf ek single main application file download button mein dega (Vivo T4x ke liye perfect)
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: YTMusic-Vivo-T4x
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
