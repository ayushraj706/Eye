name: Build and Release Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.7

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Auto-Fix Manifest and Gradle Warnings
      run: |
        echo "Fixing Missing Icons in Manifest..."
        sed -i '/android:icon/d' app/src/main/AndroidManifest.xml || true
        sed -i '/android:roundIcon/d' app/src/main/AndroidManifest.xml || true
        echo "Fixing Kapt warning for Glide..."
        sed -i 's/annotationProcessor/kapt/g' app/build.gradle.kts || true
        echo "Removing conflicting repositories from build.gradle.kts..."
        sed -i '/google()/d' build.gradle.kts || true
        sed -i '/mavenCentral()/d' build.gradle.kts || true

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Unsigned Release APK
      run: ./gradlew assembleRelease --stacktrace

    # 🔥 NAYA MAGIC STEP: CLOUD PAR AUTO-SIGNING 🔥
    - name: Sign Release APK automatically
      run: |
        # 1. Unsigned APK ko dhoondo
        APK_PATH=$(find app/build/outputs/apk/release -name "*-unsigned.apk" | head -n 1)
        
        # 2. Cloud par automatically ek Digital Key (Keystore) banao
        keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass "superkey123" -keypass "superkey123" -dname "CN=GlassMusic, OU=App, O=SuperKey, L=Samastipur, S=Bihar, C=IN"
        
        # 3. Android build tools ka rasta nikalo
        BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
        
        # 4. APK ko align karo (Performance aur Play Store ke liye zaroori)
        $BUILD_TOOLS/zipalign -v 4 $APK_PATH app-release-aligned.apk
        
        # 5. Generate ki gayi key se APK ko Sign karo
        $BUILD_TOOLS/apksigner sign --ks release.keystore --ks-pass pass:superkey123 --key-pass pass:superkey123 --out app-release-signed.apk app-release-aligned.apk

    # 🔥 AB SIRF SIGN KIYI HUI APK UPLOAD HOGI 🔥
    - name: Upload Signed Release APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk-signed
        path: app-release-signed.apk

    - name: Create Auto-Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Glass Music Auto-Release v1.0.${{ github.run_number }}
        body: "Automated build for Glass Music app (Signed Release). Yeh APK ab direct install ho jayegi!"
        files: app-release-signed.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
