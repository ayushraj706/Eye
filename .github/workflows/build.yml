name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ☕ JDK 21 plugins compatibility ke liye zaroori hai
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🕵️‍♂️ Find ALL Syntax Errors (TypeScript)
        continue-on-error: true
        run: npx tsc --noEmit

      - name: 🕵️‍♂️ Find ALL Code Errors (ESLint)
        continue-on-error: true
        run: npx next lint

      - name: Build Web (Next.js)
        run: |
          rm -rf .next
          npm run build

      # 🛠️ Fresh Android Generation + Package Naming Alignment (Crash aur Identity Fix)
      - name: Setup Capacitor Android
        run: |
          # 1. Purane aadhe-adhure code ko server se saaf karo
          rm -rf android
          
          # 2. Fresh wrapper platform generate karo
          npx cap add android
          npx cap sync android
          
          # 3. build.gradle (App level) mein applicationId dynamically badlo
          SED_APP_GRADLE="android/app/build.gradle"
          if [ -f "$SED_APP_GRADLE" ]; then
            sed -i 's/applicationId ".*"/applicationId "com.ytmusic.wrapper"/g' $SED_APP_GRADLE
            echo "App level build.gradle patched! ✓"
          fi

          # 4. AndroidManifest.xml network settings fix karo
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # Internet aur Network State permissions inject karo
            sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST_PATH
            # Cleartext traffic aur hardware acceleration enable karo (Splash screen par freeze fix)
            sed -i 's/<application/<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true"/g' $MANIFEST_PATH
            echo "AndroidManifest.xml successfully patched! ✓"
          fi

          # 5. Java Folder Setup (Default path se shift karke com.ytmusic.wrapper banana)
          cd android/app/src/main/java
          
          # Pehle se bana default activity dhundo
          DEFAULT_MAIN_ACT=$(find . -name "MainActivity.java" | head -n 1)
          
          if [ ! -z "$DEFAULT_MAIN_ACT" ]; then
            # Custom directory path banao
            mkdir -p com/ytmusic/wrapper
            # File ko naye folder mein copy karo
            cp $DEFAULT_MAIN_ACT com/ytmusic/wrapper/MainActivity.java
            # Java file ke andar ka package header text badlo
            sed -i 's/package .*/package com.ytmusic.wrapper;/g' com/ytmusic/wrapper/MainActivity.java
            
            # Purane default folders (like io/ or com/example/) ko delete karo taaki duplicate compile error na aaye
            find . -maxdepth 1 -type d ! -name "." ! -name "com" -exec rm -rf {} + 2>/dev/null || true
            rm -rf com/example com/ionic 2>/dev/null || true
            
            echo "MainActivity package structure successfully aligned! ✓"
          fi

      # 🚀 Fresh generated directory ke andar jaakar universal APK banayega
      - name: Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # ✍️ UNSIGNED APK KO SIGN KAREGA (Taaki Vivo T4x me installation block na ho)
      - name: Sign Android APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            $BUILD_TOOLS_DIR/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out android/app/build/outputs/apk/release/YTMusic-Signed.apk android/app/build/outputs/apk/release/app-release-unsigned.apk || true
          fi
          
          # Backup Fallback: Agar upar wala bypass hua toh debug build auto-generate hogi jo already signed hoti hai
          if [ ! -f "android/app/build/outputs/apk/release/YTMusic-Signed.apk" ]; then
            echo "Release sign failed, generating debug signed build as fallback..."
            cd android && ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/YTMusic-Signed.apk
          fi

      # 📦 Sirf ek single main application file download button mein dega (Vivo T4x ke liye perfect)
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: YTMusic-Vivo-T4x
          path: android/app/build/outputs/apk/release/YTMusic-Signed.apk
