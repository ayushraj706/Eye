name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🕵️‍♂️ Find ALL Syntax Errors (TypeScript)
        continue-on-error: true
        run: npx tsc --noEmit

      - name: 🕵️‍♂️ Find ALL Code Errors (ESLint)
        continue-on-error: true
        run: npx next lint

      - name: Build Web (Next.js)
        run: |
          rm -rf .next
          npm run build

      # 🛠️ Android folder ko setup aur sync karne ke liye
      - name: Setup Capacitor Android
        run: |
          npx cap add android || echo "Android platform already added"
          npx cap sync android

      # 🚀 Gradlew ko permission dekar single universal APK build karne ke liye
      - name: Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # 📦 Isse GitHub ek single Zip download button dega jisme sirf EK main APK hoga
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: YTMusic-Universal-App
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
